name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Release
        run: dotnet build src/SdtdMultiServerKit/SdtdMultiServerKit.csproj -c Release --no-incremental

      - name: Package mod zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="SdtdMultiServerKit-${VERSION}.zip"
          cd src/SdtdMultiServerKit/bin/Release/net48
          zip -r "${GITHUB_WORKSPACE}/${ARCHIVE}" . -x "*.pdb"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: ${{ env.ARCHIVE }}
          generate_release_notes: false
