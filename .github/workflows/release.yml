name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Release
        run: dotnet build src/SdtdMultiServerKit/SdtdMultiServerKit.csproj -c Release --no-incremental -v minimal

      - name: Locate build output
        id: builddir
        run: |
          BUILD_DIR=$(find src/SdtdMultiServerKit/bin -path '*/Release/net48' -type d 2>/dev/null | head -1)
          if [[ -z "$BUILD_DIR" || ! -f "$BUILD_DIR/SdtdMultiServerKit.dll" ]]; then
            echo "Could not find Release/net48 build output with SdtdMultiServerKit.dll" >&2
            find src/SdtdMultiServerKit/bin -type f -name 'SdtdMultiServerKit.dll' 2>/dev/null || true
            exit 1
          fi
          echo "dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "Using build output: $BUILD_DIR"

      - name: Copy Unity framework DLLs into Framework/
        run: bash scripts/copy-mono-runtime-dlls.sh "${{ steps.builddir.outputs.dir }}"

      - name: Package mod zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="SdtdMultiServerKit-${VERSION}.zip"
          cd "${{ steps.builddir.outputs.dir }}"
          zip -r "${GITHUB_WORKSPACE}/${ARCHIVE}" . -x "*.pdb"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: ${{ env.ARCHIVE }}
          generate_release_notes: false
          overwrite_files: true
